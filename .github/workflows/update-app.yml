name: update-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches:
      - 'master'

jobs:
  update:
    runs-on: windows-latest
    environment: update-app # secrets are gated by this environment
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      -
        name: GitHub auth token from GitHub App
        id: write-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PORTAPPS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.PORTAPPS_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.write-app.outputs.token }}
          fetch-depth: 0
          persist-credentials: false
      -
        name: Update Caprine
        id: update
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const upstream = {
              owner: 'sindresorhus',
              repo: 'caprine'
            };
            const sourceUrl = `https://github.com/${upstream.owner}/${upstream.repo}/releases`;
            const installerPattern = /^Caprine-Setup-(\d+\.\d+\.\d+)\.exe$/;

            function workspacePath(relativePath) {
              return path.join(process.env.GITHUB_WORKSPACE, relativePath);
            }

            function readFile(relativePath) {
              return fs.readFileSync(workspacePath(relativePath), 'utf8');
            }

            function writeFile(relativePath, content) {
              fs.writeFileSync(workspacePath(relativePath), content, 'utf8');
            }

            function propertyValue(content, name) {
              const pattern = new RegExp(`^${name.replaceAll('.', '\\.')}\\s*=\\s*(.+)$`, 'm');
              const match = content.match(pattern);
              if (!match) {
                throw new Error(`Missing ${name} in build.properties`);
              }
              return match[1].trim();
            }

            function replaceProperty(content, name, value) {
              const pattern = new RegExp(`^(${name.replaceAll('.', '\\.')}\\s*=\\s*).+$`, 'm');
              if (!pattern.test(content)) {
                throw new Error(`Missing ${name} in build.properties`);
              }
              return content.replace(pattern, `$1${value}`);
            }

            function compareVersions(left, right) {
              const leftParts = left.split('.').map(Number);
              const rightParts = right.split('.').map(Number);
              for (let i = 0; i < Math.max(leftParts.length, rightParts.length); i++) {
                const diff = (leftParts[i] || 0) - (rightParts[i] || 0);
                if (diff !== 0) {
                  return diff;
                }
              }
              return 0;
            }

            function compareCandidates(left, right) {
              const versionDiff = compareVersions(left.version, right.version);
              if (versionDiff !== 0) {
                return versionDiff;
              }
              return new Date(left.publishedAt) - new Date(right.publishedAt);
            }

            function candidateFromRelease(release) {
              if (release.draft || release.prerelease) {
                return null;
              }

              for (const asset of release.assets || []) {
                const match = installerPattern.exec(asset.name);
                if (match) {
                  return {
                    version: match[1],
                    archiveName: asset.name,
                    downloadUrl: asset.browser_download_url,
                    tagName: release.tag_name,
                    htmlUrl: release.html_url,
                    publishedAt: release.published_at
                  };
                }
              }

              return null;
            }

            async function latestStableInstaller() {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: upstream.owner,
                repo: upstream.repo,
                per_page: 100
              });
              const candidates = releases.map(candidateFromRelease).filter(Boolean);
              if (candidates.length === 0) {
                throw new Error(`No stable Windows Caprine installers found in ${sourceUrl}`);
              }
              candidates.sort(compareCandidates);
              return candidates.at(-1);
            }

            const latest = await latestStableInstaller();
            core.info(`Resolved latest stable Caprine installer: ${JSON.stringify(latest)}`);

            const relativePath = 'build.properties';
            const currentContent = readFile(relativePath);
            const currentVersion = propertyValue(currentContent, 'app.version');
            const currentRelease = Number(propertyValue(currentContent, 'app.release'));
            if (!Number.isInteger(currentRelease)) {
              throw new Error(`Invalid app.release in ${relativePath}: ${currentRelease}`);
            }

            let updatedContent = replaceProperty(currentContent, 'app.version', latest.version);
            const versionChanged = updatedContent !== currentContent;
            const nextRelease = versionChanged ? currentRelease + 1 : currentRelease;
            updatedContent = replaceProperty(updatedContent, 'app.release', String(nextRelease));

            if (updatedContent !== currentContent) {
              writeFile(relativePath, updatedContent);
              core.info(`Updated ${relativePath}`);
            } else {
              core.info(`${relativePath} is already up to date`);
            }

            core.setOutput('title', `Caprine ${latest.version}`);
            core.setOutput('version', latest.version);
            core.setOutput('previous-version', currentVersion);
            core.setOutput('release', String(nextRelease));
            core.setOutput('version-changed', String(versionChanged));
      -
        name: Setup Go
        if: steps.update.outputs.version-changed == 'true'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      -
        name: Update assets
        if: steps.update.outputs.version-changed == 'true'
        run: |
          $env:PATH = "$(go env GOPATH)\bin;$env:PATH"
          go generate -run go-bindata .
      -
        name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: ${{ github.event.repository.default_branch }}
          branch: update-caprine
          token: ${{ steps.write-app.outputs.token }}
          commit-message: ${{ steps.update.outputs.title }}
          title: ${{ steps.update.outputs.title }}
          signoff: true
          sign-commits: true
          delete-branch: true
          body: |
            This updates Caprine to ${{ steps.update.outputs.version }}.
